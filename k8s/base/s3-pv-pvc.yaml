apiVersion: v1
kind: PersistentVolume
metadata:
  name: s3-pv-messager-uploads
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - allow-delete
    - region=us-east-1
    - endpoint=http://minio.messager:9000
    - use_path_request_style
  csi:
    driver: ch.ctrox.csi.s3-driver
    volumeHandle: messager-uploads-bucket
    nodePublishSecretRef:
      name: csi-s3-secret
      namespace: messager
    volumeAttributes:
      bucketName: messager-uploads
      mounter: rclone
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: message-uploads-pvc
  namespace: messager
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: s3-pv-messager-uploads
  storageClassName: ""