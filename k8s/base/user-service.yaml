apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: messager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: workload
                operator: In
                values:
                - app
      containers:
      - env:
        - name: HTTP_PORT
          valueFrom:
            configMapKeyRef:
              key: USER_HTTP_PORT
              name: messager-config
        - name: DB_DSN
          valueFrom:
            secretKeyRef:
              key: USER_DB_DSN
              name: messager-db-secret
        image: mablinov2704/user-service:latest
        name: user-service
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: 150m
            memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: messager
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081